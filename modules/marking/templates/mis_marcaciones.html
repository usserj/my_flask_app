{% extends "home.html" %}

{% block content %}
    <div class="container">
        <h1>Mis Marcaciones</h1>
        <table class="table">
            <thead>
                <tr>
                    <th>Fecha y Hora</th>
                    <th>Tipo de Marcación</th>
                </tr>
            </thead>
            <tbody>
                {% for marcacion in marcaciones %}
                <tr>
                    <td>{{ marcacion.FechaHoraMarcacion }}</td>
                    <td>{{ marcacion.TipoMarcacion }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
